<html lang="en">
  <head>

    <title>tym2muv | Secure Marketplace</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Wix+Madefor+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Montserrat', sans-serif; 
        scroll-behavior: smooth;
        background-color: #ffffff;
      }
      
      /* Glassmorphism Classes */
      
      /* Standard Glass Card - Neutral / White */
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
      }

      /* Hover effect for glass cards */
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 12px 40px -8px rgba(0, 0, 0, 0.1);
      }
      
      /* Legacy Glass Utility (Updated) */
      .glass {
        background: rgba(255, 255, 255, 0.85);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(243, 232, 255, 0.8));
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }
      
      .glass-strong {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(233, 213, 255, 0.9));
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 10px 15px -3px rgba(147, 51, 234, 0.1);
      }

      .glass-tech {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(233, 213, 255, 0.5); /* Subtle purple tint border */
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.05);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.02);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(147, 51, 234, 0.2);
        border-radius: 10px;
      }
      .custom-scrollbar:hover::-webkit-scrollbar-thumb {
        background: rgba(147, 51, 234, 0.4);
      }
      
      .pause-on-hover:hover {
        animation-play-state: paused;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
